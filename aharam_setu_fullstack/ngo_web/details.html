<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Details</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"><div class="container py-4" style="max-width:700px;">
  <a href="dashboard.html" class="btn btn-link">← Back</a>
  <h3>Donation Details & Status Update</h3>
  <div class="card"><div class="card-body">
    <select id="status" class="form-select mb-3">
      <option>Pickup Started</option>
      <option>Food Collected</option>
      <option>Delivered</option>
    </select>
    <input id="volunteer" class="form-control mb-3" placeholder="Volunteer Name" />
    <button class="btn btn-primary" onclick="updateStatus()">Update Status</button>
    <p class="text-muted mt-3">Upload proof image can be connected to Firebase Storage/S3.</p>
  </div></div>
</div>
<script>
const API = localStorage.getItem('API_BASE_URL') || 'http://127.0.0.1:8000';
const userId = localStorage.getItem('ngo_user_id') || 'usr_2';
const id = new URLSearchParams(location.search).get('id');
async function updateStatus() {
  const status = document.getElementById('status').value;
  const volunteerName = document.getElementById('volunteer').value;
  const res = await fetch(`${API}/ngo/donations/${id}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-user-id': userId, 'x-role': 'ngo' },
    body: JSON.stringify({ status, volunteerName })
  });
  const data = await res.json();
  alert(data.message || 'Updated');
}
</script>
</body></html>
