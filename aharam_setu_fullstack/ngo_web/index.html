<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aharam Setu NGO Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 460px;">
    <h2 class="fw-bold">Aharam Setu</h2>
    <p class="text-muted">NGO Login • Food Rescue Dashboard</p>
    <div class="card shadow-sm">
      <div class="card-body">
        <label class="form-label">NGO User ID</label>
        <input id="userId" class="form-control mb-3" placeholder="usr_2" />
        <button class="btn btn-success w-100" onclick="login()">Enter Dashboard</button>
      </div>
    </div>
    <p class="mt-3 text-secondary">Every meal shared saves a life.</p>
  </div>
  <script>
    function login() {
      const userId = document.getElementById('userId').value.trim();
      if (!userId) return alert('Enter NGO user id');
      localStorage.setItem('ngo_user_id', userId);
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
