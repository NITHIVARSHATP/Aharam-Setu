<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Donations Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar bg-white shadow-sm mb-4"><div class="container"><span class="navbar-brand fw-bold">Aharam Setu • NGO Dashboard</span><a href="analytics.html" class="btn btn-outline-primary btn-sm">Analytics</a></div></nav>
  <div class="container">
    <div class="row" id="list"></div>
  </div>

  <script>
    const API = localStorage.getItem('API_BASE_URL') || 'http://127.0.0.1:8000';
    const userId = localStorage.getItem('ngo_user_id') || 'usr_2';
    async function loadDonations() {
      const res = await fetch(`${API}/ngo/donations/live`, { headers: { 'x-user-id': userId, 'x-role': 'ngo' } });
      const data = await res.json();
      const root = document.getElementById('list');
      root.innerHTML = '';
      data.forEach(item => {
        root.innerHTML += `
          <div class="col-md-6 col-lg-4 mb-3">
            <div class="card h-100 shadow-sm">
              <div class="card-body">
                <h5>${item.foodType}</h5>
                <p class="mb-1">Qty: <b>${item.quantity} kg</b></p>
                <p class="mb-1">Location: ${item.pickupLocation}</p>
                <p class="mb-2"><span class="badge text-bg-warning">${item.status}</span></p>
                <button class="btn btn-success btn-sm" onclick="accept('${item.donationId}')">Accept</button>
                <a class="btn btn-outline-secondary btn-sm" href="details.html?id=${item.donationId}">Details</a>
              </div>
            </div>
          </div>`;
      });
    }
    async function accept(id) {
      await fetch(`${API}/ngo/donations/${id}/accept`, { method: 'POST', headers: { 'x-user-id': userId, 'x-role': 'ngo' } });
      loadDonations();
    }
    loadDonations();
  </script>
</body>
</html>
