<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NGO Analytics</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary"><div class="container py-4">
  <a href="dashboard.html" class="btn btn-link">← Back</a>
  <h3>Impact Analytics</h3>
  <div class="row g-3 mt-1">
    <div class="col-md-4"><div class="card"><div class="card-body"><h6>Total Food Rescued</h6><h4 id="rescued">-</h4></div></div></div>
    <div class="col-md-4"><div class="card"><div class="card-body"><h6>Meals Served</h6><h4 id="meals">-</h4></div></div></div>
    <div class="col-md-4"><div class="card"><div class="card-body"><h6>Response Speed</h6><h4 id="speed">-</h4></div></div></div>
  </div>
</div>
<script>
const API = localStorage.getItem('API_BASE_URL') || 'http://127.0.0.1:8000';
const userId = localStorage.getItem('ngo_user_id') || 'usr_2';
fetch(`${API}/ngo/analytics/me`, { headers: { 'x-user-id': userId, 'x-role': 'ngo' } })
  .then(r => r.json())
  .then(data => {
    document.getElementById('rescued').innerText = `${data.totalRescued} kg`;
    document.getElementById('meals').innerText = data.mealsServed;
    document.getElementById('speed').innerText = data.responseSpeed;
  });
</script>
</body></html>
